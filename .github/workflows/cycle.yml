name: Zoom prediction cycle

# GitHub Actions cron can't express "every 90 minutes" as a single field
# (minute values only go 0-59). Two schedules 90 minutes apart give the
# same effect: 00:00, 01:30, 03:00, 04:30, ... every 90 minutes, all day.
#
# NOTE: GitHub's scheduled triggers are best-effort and can slip by minutes
# to (rarely) tens of minutes under load -- not a hard real-time guarantee.
# That's fine at this cadence: a season takes ~2.5 days to complete, so
# occasional schedule drift doesn't put data at real risk. A prolonged
# outage (hours, not minutes) is the actual danger -- GitHub emails the
# repo owner automatically when a scheduled run fails, and `workflow_dispatch`
# below lets you trigger a catch-up run by hand at any time.
on:
  schedule:
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: zoom-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full cycle (scrape -> features -> predict -> track -> dashboard)
        run: python run.py cycle

      - name: Commit and push updated DB + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zoom.db docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated cycle: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
