name: Zoom prediction cycle

# Every hour on the hour -- tightened from 90 minutes to be safer relative
# to how long a round actually takes (~90 min), leaving more margin against
# schedule drift or a skipped run.
#
# NOTE: GitHub's scheduled triggers are best-effort and can slip by minutes
# to (rarely) tens of minutes under load -- not a hard real-time guarantee.
# That's fine at this cadence: a season takes ~2.5 days to complete, so
# occasional schedule drift doesn't put data at real risk. A prolonged
# outage (hours, not minutes) is the actual danger -- GitHub emails the
# repo owner automatically when a scheduled run fails, and `workflow_dispatch`
# below lets you trigger a catch-up run by hand at any time.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: zoom-cycle
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full cycle (scrape -> features -> predict -> track -> dashboard)
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 ==="
            if python run.py cycle; then
              exit 0
            fi
            echo "Attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 30s..."
              sleep 30
            fi
          done
          echo "All 3 attempts failed."
          exit 1

      - name: Commit and push updated DB + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zoom.db docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated cycle: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
